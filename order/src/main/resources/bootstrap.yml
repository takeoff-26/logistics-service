spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: order
  profiles:
    active: local
  cloud:
    config:
      uri: http://config:8888

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://server:18999/eureka/
