server:
  port: 19030

spring:
  application:
    name: company
  datasource:
    url: jdbc:postgresql://localhost:5432/company
    username: sa
    password: sa
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:18999/eureka/